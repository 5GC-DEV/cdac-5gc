# Disable 4G Control Plane
omec-control-plane:
  enable4G: false

# Disable 5G RAN Simulator
5g-ran-sim:
  enable: false

# Override values for 5g-control-plane Helm Chart
# https://github.com/omec-project/sdcore-helm-charts/blob/main/5g-control-plane/values.yaml
5g-control-plane:
  enable5G: true
  images:
    repository: "docker.io/"    # defaults to Docker Hub
    tags:
      amf: cdac5gc/5gc-amf:master-5dcbbc0
      smf: cdac5gc/5gc-smf:master-9abff85
      pcf: cdac5gc/5gc-pcf:master-844e50a
      nrf: cdac5gc/5gc-nrf:master-071a926
      ausf: cdac5gc/5gc-ausf:master-25c1fc8
      nssf: cdac5gc/5gc-nssf:master-0442b63
      udm: cdac5gc/5gc-udm:master-99e7a1e
      udr: cdac5gc/5gc-udr:master-2da6b54
      webui: cdac5gc/5gc-webui:master-72b030a
      metricfunc: cdac5gc/metricfunc:master-cb7c797
    # refer to above Helm Chart to add other NF images

  kafka:
    deploy: true

  mongodb:
    usePassword: false
    persistence:
      enabled: false
    architecture: replicaset
    replicaCount: 2

  resources:
    enabled: false

  config:
    #logger:
    #  Util:
     #   debugLevel: warn
    #   # network function
    #   AMF:
    #     debugLevel: trace
    #   SMF:
    #     debugLevel: trace

    mongodb:
      name: iosmcn
      url: mongodb://mongodb-arbiter-headless # Enable if cluster deployment required
      authKeysDbName: authentication
      authUrl: mongodb://mongodb-arbiter-headless

    managedByConfigPod:
      enabled: true
      # syncUrl: http://sdcore-adapter-v2-1.aether-roc.svc:8080/synchronize

    sctplb:
      deploy: false # If enabled then deploy sctp pod
      ngapp:
        externalIp: {{ core.amf.ip }}
        port: 38412

    upfadapter:
      deploy: false # If enabled then deploy upf adapter pod

    metricfunc:
      deploy: true
      sbi:
        scheme: http
      cfgFiles:
        metricscfg.yaml:
          configuration:
            controllerFlag: {{ core.closed_loop | default('false') }}
            userAppApiServer:
              addr: "upf"

    # Change AMF config here if rquired
    # Most of the AMF config comes from Slice APIs but some of the config is
    # directly provided through Helm Charts
    amf:
      cfgFiles:
        amfcfg.yaml:
          configuration:
            nrfUri: http://nrf:29510
            enableDBStore: true # Store AMF subscribers in the datastore
            networkFeatureSupport5GS: # 5gs Network Feature Support IE, refer to TS 24.501 sec. 9.11.3.5
              imsVoPS: 1 # IMS voice over PS session indicator (uinteger, range: 0~1)
            sbi:
              scheme: http
            # security:
            #   integrityOrder:
            #     - NIA3
            #     - NIA2
            #     - NIA0
            #   cipheringOrder:
            #     - NEA3
            #     - NEA2
            #     - NEA0

    # SMF config override. Refer to Helm Charts values for more options
    smf:
      cfgFiles:
        smfcfg.yaml:
          configuration:
            enableDBStore: true  # Store SMF subscribers in the datastore
            pcscfInfos:       # For IMS CALL
              ipv4: 172.22.0.21  
              ipv6: fe80::543b:8dff:fef6:54c
            nrfUri: http://nrf:29510
            sbi:
              scheme: http
              #tls:
              #key: gofree5gc/support/TLS/smf.key
              #pem: gofree5gc/support/TLS/smf.pem
            # staticIpInfo:
            #   - dnn: internet
            #     imsiIpInfo:
            #       imsi-208930100007510: "172.250.0.100"
            #       imsi-208930100007511: "172.250.0.101"
            #       imsi-208930100007512: "172.250.0.102"
            #       imsi-208930100007513: "172.250.0.103"
            #       imsi-208930100007514: "172.250.0.104"

    pcf:
      cfgFiles:
        pcfcfg.yaml:
          configuration:
            nrfUri: http://nrf:29510
            sbi:
              scheme: http
    ausf:
      cfgFiles:
        ausfcfg.yaml:
          configuration:
            nrfUri: http://nrf:29510
            sbi:
              scheme: http
              
    udm:
      cfgFiles:
        udmcfg.yaml:
          configuration:
            nrfUri: http://nrf:29510
            sbi:
              scheme: http
              #bindingIPv4: "0.0.0.0"
              #registerIPv4: udm
              #tls:
                #log: free5gc/udmsslkey.log
                #pem: free5gc/support/TLS/udm.pem
                #key: free5gc/support/TLS/udm.key
      
    udr:
      cfgFiles:
        udrcfg.yaml:
          configuration:
            nrfUri: http://nrf:29510
            sbi:
              scheme: http        
    
    nssf:
      cfgFiles:
        nssfcfg.yaml:
          configuration:
            nrfUri: http://nrf:29510
            sbi:
              scheme: http
            nsiList:
            - snssai:
                sst: 1
                sd: "000000"
              nsiInformationList:
                - nrfId: http://nrf:29510/nnrf-nfm/v1/nf-instances
                  nsiId: 22
                                         

    nrf:
      cfgFiles:
        nrfcfg.yaml:
          configuration:
            mongoDBStreamEnable: false    # enable/disable MongoDB stream in NRF
            nfProfileExpiryEnable: true   # If enabled, remove NF profile if no keepalive received
            nfKeepAliveTime: 60           # default timeout for NF profiles
            sbi:
              scheme: http

    webui:
      cfgFiles:
        webuicfg.yaml:
          configuration:
            managedByConfigPod:
              enabled: {{ not core.standalone }}
              syncUrl: http://roc-sdcore-adapter-v2-1.aether-roc.svc:8080/synchronize
            sbi:
              scheme: http

# Override values for omec-sub-provision (subscriber) Helm Chart
# https://github.com/omec-project/sdcore-helm-charts/blob/main/omec-sub-provision/values.yaml
# ***Note: Most of these values can (and should) be set via ROC API***
omec-sub-provision:
  enable: true
  images:
    repository: ""    # defaults to Docker Hub
    tags:
      simapp: cdac5gc/simapp:master-fbc9382

  config:
    simapp:
      cfgFiles:
        simapp.yaml:
          configuration:
            provision-network-slice: {{ core.standalone | string }} # if enabled, Device Groups & Slices configure by simapp
            sub-provision-endpt:
              addr: webui  # subscriber configuation endpoint.
            # sub-proxy-endpt: # used if subscriber proxy is enabled in the ROC.
            #   addr: subscriber-proxy.aether-roc.svc.cluster.local
            #   port: 5000

            # Configure Subscriber IMSIs and their security details.
            # You can have any number of subscriber ranges
            # This block is always necessary to establish range(s) of valid IMSIs
            subscribers:
            - ueId-start: "001010000000001"
              ueId-end: "001010000000012"
              plmnId: "00101"
              opc: "C42449363BBAD02B66D16BC975D77CC1"
              op: ""
              key: "fec86ba6eb707ed08905757b1bb44b8f"
              sequenceNumber: "16f3b3f70fc2"

            # Configure Device Groups (ignored if provision-network-slice is disabled)
            device-groups:
            - name:  "gnbsim-user-group1"
              imsis:
                - "001010000000001"
                - "001010000000002" 
                - "001010000000003"
                - "001010000000004"
                - "001010000000005"
                - "001010000000006"
                - "001010000000007"
                - "001010000000008"
                - "001010000000009"
                - "001010000000010"
                - "001010000000011"
                - "001010000000012"
              msisdns:
                - "msisdn-9000000001"
                - "msisdn-9000000002"
                - "msisdn-9000000003"
                - "msisdn-9000000004"
                - "msisdn-9000000005"
                - "msisdn-9000000006"
                - "msisdn-9000000007"
                - "msisdn-9000000008"
                - "msisdn-9000000009"
                - "msisdn-9000000010"
                - "msisdn-9000000011"
                - "msisdn-9000000012"
              ip-domain-name: "IP-Domains"
              ip-domains:
                - dnn: ims
                  dns-primary: "10.176.0.11"
                  mtu: 1400
                  ue-ip-pool: "172.252.0.0/16"
                  ue-dnn-qos:
                    dnn-mbr-downlink: 1000
                    dnn-mbr-uplink: 1000
                    bitrate-unit: Mbps
                    traffic-class:
                      name: "platinum"
                      qci: 5
                      arp: 1
                      pdb: 100
                      pelr: 6
                - dnn: internet
                  dns-primary: "10.176.0.11"
                  mtu: 1456
                  ue-ip-pool: "172.250.0.0/16"
                  ue-dnn-qos:
                    dnn-mbr-downlink: 1000
                    dnn-mbr-uplink: 1000
                    bitrate-unit: Mbps
                    traffic-class:
                      name: "platinum"
                      qci: 9
                      arp: 6
                      pdb: 300
                      pelr: 6
              site-info: "enterprise"
            # UPF allocates IP address if there is only 1 device-group
            # SMF allocates IP address if there is >1 device-group

            # Configure Network Slices (ignored if provision-network-slice is disabled)
            network-slices:
            - name: "default"      # can be any unique slice name
              slice-id:            # must match with slice configured in gNB, UE
                sd: "000000"
                sst: 1
              site-device-group:
              - "gnbsim-user-group1"   # All UEs in this device-group are assigned to this slice
              # Applicaiton filters control what each user can access.
              # Default, allow access to all applications
              application-filtering-rules:
              - rule-name: "ALLOW-ALL"
                priority: 250
                action: "permit"
                endpoint: "0.0.0.0/0"
              site-info:
                # Provide gNBs and UPF details and also PLMN for the site
                gNodeBs:
                - name: "gnb1"
                  tac: 1
                - name: "gnb2"
                  tac: 2
                plmn:
                  mcc: "001"
                  mnc: "01"
                site-name: "enterprise"
                upf:
                  upf-name: "upf"  # associated UPF for this slice. One UPF per Slice.
                  upf-port: 8805

omec-user-plane:
  enable: true
  nodeSelectors:
    enabled: true
  resources:
    enabled: false
  images:
    repository: ""    # defaults to Docker Hub
    # following two lines pull busybox from Docker Hub instead of Aether Registry
    tags:
      tools: omecproject/busybox:stable
    # uncomment following section to add update bess image tag
    tags:
      bess: docker.io/cdac5gc/upf-epc-bess:master-ivybridge-05814e9
      pfcpiface: docker.io/cdac5gc/upf-epc-pfcpiface:master-ivybridge-05814e9
  config:
    upf:
      name: "oaisim"
      sriov:
        enabled: false    # SRIOV is disabled by default
      hugepage:
        enabled: false    # Should be enabled if DPDK is enabled
      routes:
        - to: {{ ansible_default_ipv4.address }}
          via: 169.254.1.1
      enb:
        subnet: {{ ran_subnet }} # Subnet for the gNB network
      access:
        ipam: static
        cniPlugin: macvlan  # Can be any other plugin. Dictates how IP address are assigned
        iface: {{ core.data_iface }}
        gateway: {{ access_gw }}
        ip: {{ access_ip }}
      core:
        ipam: static
        cniPlugin: macvlan  # Can be any other plugin. Dictates how IP address are assigned
        iface: {{ core.data_iface }}
        gateway: {{ core_gw }}
        ip: {{ core_ip }}
      cfgFiles:
        upf.jsonc:
          mode: af_packet                # This mode implies no DPDK
          hwcksum: true
          log_level: "info"
          measure_upf: true
          measure_flow: true
          gtppsc: true                   # Extension header enabled in 5G.
          cpiface:
            dnn_list:
              - dnn: "ims"
                ue_ip_pool: "172.252.0.0/16"
              - dnn: "internet"
                ue_ip_pool: "172.250.0.0/16"              # Must match Slice dnn
            hostname: "upf"
            #http_port: "8080"
            enable_ue_ip_alloc: false    # If true, UPF allocates address from following pool
            #ue_ip_pool: {{ core.upf.default_upf.ue_ip_pool }} # IP pool used UEs if enable_ue_ip_alloc=true
          slice_rate_limit_config:       # Slice-level rate limiting (also controlled by ROC)
            # Uplink
            n6_bps: 10000000000          # 10Gbps
            n6_burst_bytes: 12500000     # 10ms * 10Gbps
            # Downlink
            n3_bps: 10000000000          # 10Gbps
            n3_burst_bytes: 12500000     # 10ms * 10Gbps
